<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE-X: Online Omok & Tetris</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Libraries (Compat version for easier global access) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: white; margin: 0; overflow-x: hidden; }
        .omok-board {
            background-color: #dcb35c;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2), 0 20px 50px rgba(0,0,0,0.5);
        }
        /* 로딩 애니메이션 */
        .loader {
            border: 3px solid #18181b;
            border-top: 3px solid #f97316;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Config & Init ---
        // 주의: 배포 시에는 본인의 Firebase Console에서 복사한 실제 config를 넣어야 온라인 기능이 작동합니다.
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { 
                apiKey: "", 
                authDomain: "", 
                projectId: "arcade-x-placeholder", 
                storageBucket: "", 
                messagingSenderId: "", 
                appId: "" 
            };
        
        // 중복 초기화 방지
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'arcade-x-default';

        const BOARD_SIZE = 15;

        // --- Omok Logic Helpers ---
        const checkRenjuRules = (board, index, color) => {
            if (color === 'white') return { forbidden: false };
            const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            let fours = 0, threes = 0;
            for (const [dr, dc] of directions) {
                let line = 1;
                for (let i = 1; i < 7; i++) {
                    const nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === 'black') line++;
                    else break;
                }
                for (let i = 1; i < 7; i++) {
                    const nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === 'black') line++;
                    else break;
                }
                if (line > 5) return { forbidden: true, reason: '장주(6목 이상) 금지' };
                if (line === 4) fours++;
                if (line === 3) threes++;
            }
            if (fours >= 2) return { forbidden: true, reason: '4-4 금수' };
            if (threes >= 2) return { forbidden: true, reason: '3-3 금수' };
            return { forbidden: false };
        };

        const checkWinner = (board, index, color) => {
            const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            for (const [dr, dc] of directions) {
                let count = 1;
                for (let i = 1; i < 6; i++) {
                    const nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === color) count++;
                    else break;
                }
                for (let i = 1; i < 6; i++) {
                    const nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === color) count++;
                    else break;
                }
                if (color === 'black' && count === 5) return true;
                if (color === 'white' && count >= 5) return true;
            }
            return false;
        };

        // --- Main Components ---
        function OmokGame({ user }) {
            const [roomId, setRoomId] = useState('');
            const [gameData, setGameData] = useState(null);
            const [inputRoomId, setInputRoomId] = useState('');
            const [myColor, setMyColor] = useState(null);
            const [forbiddenMsg, setForbiddenMsg] = useState('');
            const [showRoleSelect, setShowRoleSelect] = useState(false);
            const [error, setError] = useState('');

            useEffect(() => {
                if (!user || !roomId) return;
                
                // Firebase Config가 비어있을 경우 경고
                if (!firebaseConfig.apiKey && roomId) {
                    setError('Firebase API Key가 설정되지 않아 실시간 기능을 사용할 수 없습니다.');
                    return;
                }

                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId);
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setGameData(data);
                        if (data.playerBlack === user.uid) setMyColor('black');
                        else if (data.playerWhite === user.uid) setMyColor('white');
                        else if (!data.playerBlack) {
                            docRef.update({ playerBlack: user.uid });
                            setMyColor('black');
                        } else if (!data.playerWhite) {
                            docRef.update({ playerWhite: user.uid });
                            setMyColor('white');
                        } else {
                            setMyColor('observer');
                        }
                    } else {
                        setError('존재하지 않는 방입니다.');
                    }
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setError('데이터를 불러오는데 실패했습니다. (권한 부족 혹은 설정 오류)');
                });
                return () => unsubscribe();
            }, [user, roomId]);

            const createRoom = async (preferredColor) => {
                if (!firebaseConfig.apiKey) {
                    alert('Firebase 설정이 필요합니다.');
                    return;
                }
                const newId = Math.random().toString(36).substring(2, 8).toUpperCase();
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(newId);
                try {
                    await docRef.set({
                        board: Array(BOARD_SIZE * BOARD_SIZE).fill(null),
                        turn: 'black',
                        playerBlack: preferredColor === 'black' ? user.uid : null,
                        playerWhite: preferredColor === 'white' ? user.uid : null,
                        winner: null,
                        lastMove: null,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setRoomId(newId);
                    setShowRoleSelect(false);
                    setError('');
                } catch (e) {
                    setError('방 생성 실패: Firebase 설정을 확인하세요.');
                }
            };

            const placeStone = async (index) => {
                if (!gameData || gameData.winner || gameData.board[index] || gameData.turn !== myColor) return;
                if (myColor === 'black') {
                    const check = checkRenjuRules(gameData.board, index, 'black');
                    if (check.forbidden) {
                        setForbiddenMsg(check.reason);
                        setTimeout(() => setForbiddenMsg(''), 2000);
                        return;
                    }
                }
                const newBoard = [...gameData.board];
                newBoard[index] = myColor;
                const isWin = checkWinner(newBoard, index, myColor);
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId);
                await docRef.update({
                    board: newBoard,
                    turn: myColor === 'black' ? 'white' : 'black',
                    winner: isWin ? myColor : null,
                    lastMove: index
                });
            };

            if (error) {
                return (
                    <div className="max-w-md w-full bg-red-900/20 border border-red-500 p-6 rounded-2xl text-center">
                        <p className="text-red-400 font-bold mb-4">{error}</p>
                        <button onClick={() => {setError(''); setRoomId('');}} className="bg-red-600 px-4 py-2 rounded-lg font-bold">돌아가기</button>
                    </div>
                );
            }

            if (!roomId) {
                return (
                    <div className="max-w-md w-full bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
                        <h2 className="text-3xl font-black mb-8 text-center italic tracking-tighter text-orange-500">RENJU ONLINE</h2>
                        {showRoleSelect ? (
                            <div className="space-y-4">
                                <p className="text-center text-zinc-400 font-bold mb-4">선공/후공을 선택하세요</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => createRoom('black')} className="flex flex-col items-center gap-3 bg-zinc-800 hover:bg-black p-6 rounded-2xl border border-zinc-700 transition-all">
                                        <div className="w-10 h-10 rounded-full bg-black border border-zinc-600"></div>
                                        <span className="font-bold text-sm">흑 (선공)</span>
                                    </button>
                                    <button onClick={() => createRoom('white')} className="flex flex-col items-center gap-3 bg-zinc-800 hover:bg-zinc-100 group p-6 rounded-2xl border border-zinc-700 transition-all">
                                        <div className="w-10 h-10 rounded-full bg-white border border-zinc-300"></div>
                                        <span className="font-bold text-sm group-hover:text-black">백 (후공)</span>
                                    </button>
                                </div>
                                <button onClick={() => setShowRoleSelect(false)} className="w-full text-zinc-500 text-sm mt-4 font-bold">뒤로 가기</button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <button onClick={() => setShowRoleSelect(true)} className="w-full bg-orange-600 py-4 rounded-xl font-bold text-lg hover:bg-orange-500 transition-all shadow-lg shadow-orange-900/20">방 만들기</button>
                                <div className="relative py-4">
                                    <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-zinc-800"></div></div>
                                    <div className="relative flex justify-center text-xs uppercase"><span className="bg-zinc-900 px-2 text-zinc-500 font-black tracking-widest">OR</span></div>
                                </div>
                                <input type="text" placeholder="코드 입력" value={inputRoomId} onChange={e => setInputRoomId(e.target.value)} className="w-full bg-black border border-zinc-800 py-4 rounded-xl text-center font-mono text-xl uppercase outline-none focus:border-orange-600 transition-colors" />
                                <button onClick={() => setRoomId(inputRoomId.toUpperCase())} className="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-zinc-200 transition-all">참가하기</button>
                            </div>
                        )}
                        <p className="mt-8 text-[10px] text-zinc-600 text-center leading-relaxed">
                            * 본 게임은 Firebase 연동이 필요합니다.<br/>설정이 안된 경우 검은 화면이나 오류가 발생할 수 있습니다.
                        </p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-[600px] animate-in fade-in duration-500">
                    <div className="w-full flex justify-between items-center bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                        <div>
                            <div className="text-[10px] text-zinc-500 font-bold uppercase">Room Code</div>
                            <div className="text-xl font-black text-orange-500 font-mono tracking-widest">{roomId}</div>
                        </div>
                        <div className="text-center">
                            <div className={`w-3 h-3 rounded-full mx-auto mb-1 ${gameData?.winner ? 'bg-zinc-700' : 'bg-green-500 animate-pulse'}`}></div>
                            <div className="text-[10px] font-bold text-zinc-400 uppercase">{gameData?.winner ? 'Ended' : 'Live'}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] text-zinc-500 font-bold uppercase">Your Role</div>
                            <div className="flex items-center gap-2 justify-end">
                                <span className="font-bold text-sm tracking-tighter">{myColor === 'black' ? 'BLACK' : myColor === 'white' ? 'WHITE' : 'SPECTATOR'}</span>
                                <div className={`w-3 h-3 rounded-full border ${myColor === 'black' ? 'bg-black border-zinc-600' : myColor === 'white' ? 'bg-white border-zinc-300' : 'bg-transparent border-dashed border-zinc-600'}`}></div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full h-14 relative flex items-center justify-center">
                        {forbiddenMsg && <div className="absolute inset-0 bg-red-600 text-white flex items-center justify-center rounded-xl font-black z-50 animate-bounce shadow-xl">{forbiddenMsg}! ⚠️</div>}
                        {gameData?.winner ? (
                            <div className="w-full h-full bg-orange-600 text-white flex items-center justify-center rounded-xl font-black text-xl italic uppercase tracking-tighter">
                                {gameData.winner} wins! 👑
                            </div>
                        ) : (
                            <div className={`w-full h-full flex items-center justify-center rounded-xl border-2 font-black text-lg transition-all ${gameData?.turn === myColor ? 'bg-white text-black border-white shadow-xl' : 'bg-zinc-900 text-zinc-600 border-zinc-800'}`}>
                                {gameData?.turn === myColor ? '⚡ YOUR TURN ⚡' : `${gameData?.turn?.toUpperCase()}'S TURN...`}
                            </div>
                        )}
                    </div>

                    <div className="relative w-full aspect-square omok-board p-2 rounded-lg border-8 border-[#9e7d38] shadow-2xl">
                        <div className="grid w-full h-full" style={{ gridTemplateColumns: `repeat(${BOARD_SIZE}, 1fr)`, gridTemplateRows: `repeat(${BOARD_SIZE}, 1fr)` }}>
                            {Array(BOARD_SIZE * BOARD_SIZE).fill(null).map((_, i) => (
                                <div key={i} onClick={() => placeStone(i)} className="relative flex items-center justify-center cursor-pointer group">
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <div className="h-[1px] bg-black/30 w-full"></div>
                                        <div className="w-[1px] bg-black/30 h-full absolute"></div>
                                    </div>
                                    {gameData?.board[i] && (
                                        <div className={`w-[88%] h-[88%] rounded-full z-10 shadow-lg transform transition-transform duration-200 scale-100 hover:scale-105 ${gameData.board[i] === 'black' ? 'bg-gradient-to-br from-zinc-700 to-black' : 'bg-gradient-to-br from-white to-zinc-300'} ${gameData.lastMove === i ? 'ring-2 ring-red-500 ring-offset-2 ring-offset-[#dcb35c]' : ''}`}></div>
                                    )}
                                    {!gameData?.board[i] && !gameData?.winner && gameData?.turn === myColor && (
                                        <div className={`w-[50%] h-[50%] rounded-full opacity-0 group-hover:opacity-40 z-10 transition-opacity ${myColor === 'black' ? 'bg-black' : 'bg-white'}`}></div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                    <button onClick={() => {setRoomId(''); setGameData(null);}} className="px-8 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-full text-zinc-500 hover:text-white font-bold text-xs uppercase tracking-widest transition-all">Leave Room</button>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('omok');
            const [isInitialLoading, setIsInitialLoading] = useState(true);

            useEffect(() => {
                // Firebase 초기화 확인 후 인증 시작
                const startAuth = async () => {
                    try {
                        const unsubscribe = auth.onAuthStateChanged(async (u) => {
                            if (u) {
                                setUser(u);
                                setIsInitialLoading(false);
                            } else {
                                // 익명 로그인 시도
                                try {
                                    await auth.signInAnonymously();
                                } catch (e) {
                                    console.error("Auth Error:", e);
                                    // Firebase 설정이 안되어 있어도 UI는 보여주기 위해 더미 유저 설정
                                    setUser({ uid: 'offline-user-' + Math.random().toString(36).substr(2, 5) });
                                    setIsInitialLoading(false);
                                }
                            }
                        });
                        return () => unsubscribe();
                    } catch (e) {
                        setIsInitialLoading(false);
                        setUser({ uid: 'error-user' });
                    }
                };
                
                startAuth();
            }, []);

            if (isInitialLoading) return (
                <div className="h-screen flex flex-col items-center justify-center gap-4">
                    <div className="loader"></div>
                    <div className="font-black tracking-[0.2em] text-orange-500 animate-pulse text-sm">INITIALIZING ARCADE-X</div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-[#09090b]">
                    <nav className="p-4 md:p-6 border-b border-zinc-900 flex justify-between items-center bg-zinc-950/50 sticky top-0 z-50 backdrop-blur-xl">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-orange-400 to-orange-600 rounded-xl flex items-center justify-center font-black text-white italic shadow-lg shadow-orange-900/20">A</div>
                            <span className="font-black text-2xl tracking-tighter hidden sm:block">ARCADE-X</span>
                        </div>
                        <div className="flex bg-zinc-900/50 p-1 rounded-xl border border-zinc-800">
                            <button onClick={() => setActiveTab('omok')} className={`px-5 py-2 rounded-lg font-bold text-xs md:text-sm transition-all ${activeTab === 'omok' ? 'bg-zinc-800 text-white shadow-inner' : 'text-zinc-500 hover:text-zinc-300'}`}>OMOK</button>
                            <button onClick={() => setActiveTab('tetris')} className={`px-5 py-2 rounded-lg font-bold text-xs md:text-sm transition-all ${activeTab === 'tetris' ? 'bg-zinc-800 text-white shadow-inner' : 'text-zinc-500 hover:text-zinc-300'}`}>TETRIS</button>
                        </div>
                    </nav>
                    <main className="flex-grow flex flex-col items-center justify-center p-4 md:p-8">
                        {activeTab === 'omok' ? (
                            <OmokGame user={user} />
                        ) : (
                            <div className="flex flex-col items-center gap-4 text-zinc-700 animate-pulse">
                                <div className="text-6xl">🕹️</div>
                                <div className="font-black italic tracking-widest text-xl">TETRIS COMING SOON</div>
                            </div>
                        )}
                    </main>
                    <footer className="p-6 text-center text-[10px] text-zinc-700 font-bold tracking-widest uppercase border-t border-zinc-900">
                        &copy; 2024 Arcade-X Gaming Environment
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
