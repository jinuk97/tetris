<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE-X: Tetris 100+ Stages</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #09090b; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
        }
        
        .tetris-wrapper {
            width: 100%;
            height: calc(100vh - 180px);
            max-width: 900px;
            margin: 0 auto;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid #18181b;
        }

        .tetris-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .glow-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.08) 0%, rgba(9, 9, 11, 0) 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* 커스텀 스크롤바 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

        .stage-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .stage-card:hover {
            transform: scale(1.05);
            border-color: #f97316;
            background-color: rgba(39, 39, 42, 0.8);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // 100개 이상의 스테이지를 생성하기 위한 헬퍼 데이터
        const CATEGORIES = ["ALL", "SHAPES", "ALPHABET", "EMOJI", "CHALLENGE"];
        
        const generateStages = () => {
            const stages = [
                { id: 'classic', name: 'Classic', desc: 'No obstacles', icon: '⬜', cat: 'ALL' },
                { id: 'heart', name: 'Heart', desc: 'Love pattern', icon: '❤️', cat: 'SHAPES' },
                { id: 'cross', name: 'X-Cross', desc: 'Intersection', icon: '❌', cat: 'SHAPES' },
                { id: 'pyramid', name: 'Pyramid', desc: 'Ancient structure', icon: '⛰️', cat: 'SHAPES' },
                { id: 'diamond', name: 'Diamond', desc: 'Sparkling block', icon: '💎', cat: 'SHAPES' },
            ];

            // 알파벳 스테이지 추가 (A-Z)
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(char => {
                stages.push({
                    id: `alpha-${char.toLowerCase()}`,
                    name: `Stage ${char}`,
                    desc: `Pattern shaped like ${char}`,
                    icon: '🔡',
                    cat: 'ALPHABET'
                });
            });

            // 이모지 및 특수 패턴 추가 (나머지 100개 채우기)
            const emojis = ['🔥', '⭐', '🍀', '💀', '👻', '👾', '🚀', '🌈', '⚡', '🌊', '🍄', '🎈', '🎨', '🎯', '🧩', '🌙', '☀️', '🌀', '🔔', '🛡️'];
            emojis.forEach((emoji, idx) => {
                stages.push({
                    id: `emoji-${idx}`,
                    name: `Special ${idx + 1}`,
                    desc: `Extreme ${emoji} challenge`,
                    icon: emoji,
                    cat: 'EMOJI'
                });
            });

            // 챌린지 모드 (레벨 기반)
            for(let i=1; i<=50; i++) {
                stages.push({
                    id: `lv-${i}`,
                    name: `Level ${i}`,
                    desc: `High difficulty level ${i}`,
                    icon: '🚧',
                    cat: 'CHALLENGE'
                });
            }

            return stages;
        };

        const ALL_STAGES = generateStages();

        function App() {
            const [selectedStage, setSelectedStage] = useState(null);
            const [filter, setFilter] = useState('ALL');
            const [searchQuery, setSearchQuery] = useState('');

            const filteredStages = useMemo(() => {
                return ALL_STAGES.filter(stage => {
                    const matchesFilter = filter === 'ALL' || stage.cat === filter;
                    const matchesSearch = stage.name.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesFilter && matchesSearch;
                });
            }, [filter, searchQuery]);

            return (
                <div className="min-h-screen flex flex-col bg-[#09090b] relative">
                    <div className="glow-bg"></div>
                    
                    <nav className="p-4 md:p-6 flex justify-between items-center bg-zinc-950/50 border-b border-zinc-900 backdrop-blur-xl z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-gradient-to-br from-orange-400 to-orange-600 rounded-xl flex items-center justify-center font-black text-white italic shadow-lg shadow-orange-900/20">A</div>
                            <span className="font-black text-2xl tracking-tighter">ARCADE-X</span>
                        </div>
                        {selectedStage && (
                            <button 
                                onClick={() => setSelectedStage(null)}
                                className="px-4 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-lg text-xs font-bold transition-all text-orange-500"
                            >
                                BACK TO MENU
                            </button>
                        )}
                    </nav>

                    <main className="flex-grow flex flex-col items-center p-4 overflow-hidden">
                        {!selectedStage ? (
                            <div className="w-full max-w-6xl h-full flex flex-col animate-in fade-in duration-500">
                                <div className="text-center mb-6">
                                    <h2 className="text-3xl font-black italic tracking-tighter text-white mb-2 uppercase">Select your Challenge</h2>
                                    <p className="text-zinc-500 text-sm">100개 이상의 다양한 스테이지 패턴이 준비되어 있습니다.</p>
                                </div>

                                {/* 필터 및 검색 바 */}
                                <div className="flex flex-col md:flex-row gap-4 mb-6 items-center justify-between bg-zinc-900/30 p-4 rounded-2xl border border-zinc-800">
                                    <div className="flex gap-2 overflow-x-auto pb-2 md:pb-0 no-scrollbar">
                                        {CATEGORIES.map(cat => (
                                            <button
                                                key={cat}
                                                onClick={() => setFilter(cat)}
                                                className={`px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest transition-all ${filter === cat ? 'bg-orange-600 text-white' : 'bg-zinc-800 text-zinc-500 hover:bg-zinc-700'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Search Stage..." 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="bg-black border border-zinc-800 rounded-lg px-4 py-1.5 text-xs w-full md:w-64 focus:border-orange-500 outline-none transition-all"
                                    />
                                </div>
                                
                                {/* 스테이지 리스트 그리드 */}
                                <div className="flex-grow overflow-y-auto custom-scroll pr-2 pb-10">
                                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3">
                                        {filteredStages.map((stage) => (
                                            <div 
                                                key={stage.id}
                                                onClick={() => setSelectedStage(stage.id)}
                                                className="stage-card cursor-pointer bg-zinc-900/40 border border-zinc-800/50 p-4 rounded-xl flex flex-col items-center text-center group"
                                            >
                                                <div className="text-2xl mb-2 group-hover:animate-bounce">{stage.icon}</div>
                                                <h3 className="font-bold text-xs text-zinc-200 mb-1 truncate w-full">{stage.name}</h3>
                                                <span className="text-[9px] text-zinc-600 font-bold uppercase tracking-tighter">{stage.cat}</span>
                                            </div>
                                        ))}
                                    </div>
                                    {filteredStages.length === 0 && (
                                        <div className="text-center py-20 text-zinc-600 font-bold">No stages found.</div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="w-full flex flex-col items-center animate-in slide-in-from-bottom duration-500">
                                <div className="mb-4 flex items-center gap-3 bg-zinc-900/80 px-4 py-2 rounded-full border border-zinc-800">
                                    <span className="text-orange-500 font-bold text-[10px] uppercase tracking-widest">Stage Active:</span>
                                    <span className="font-black text-white text-xs uppercase tracking-tighter">
                                        {ALL_STAGES.find(s => s.id === selectedStage)?.name}
                                    </span>
                                </div>
                                
                                <div className="tetris-wrapper relative group">
                                    <iframe 
                                        src={`https://jinuk97.github.io/tetris/?stage=${selectedStage}`} 
                                        className="tetris-iframe"
                                        title="Tetris Game"
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                        allowFullScreen
                                    ></iframe>
                                    
                                    <div className="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black/80 backdrop-blur-md px-6 py-2 rounded-full border border-white/10 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                                        <p className="text-zinc-300 text-[9px] font-bold uppercase tracking-widest flex gap-4">
                                            <span>← → : Move</span>
                                            <span>↑ : Rotate</span>
                                            <span>Space : Hard Drop</span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="p-3 text-center border-t border-zinc-900 bg-zinc-950/30">
                        <p className="text-[9px] text-zinc-700 font-bold tracking-widest uppercase">
                            Total Stages: {ALL_STAGES.length} • ARCADE-X Pro
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
