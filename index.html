<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE-X: Online Omok & Tetris</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: white; margin: 0; }
        .omok-board {
            background-color: #dcb35c;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.2), 0 20px 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Firebase Config & Init ---
        // 환경 변수가 없을 경우를 대비한 기본 설정 (실제 배포 시 __firebase_config가 주입됨)
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'arcade-x-default';

        const BOARD_SIZE = 15;

        // --- Omok Logic Helpers ---
        const checkRenjuRules = (board, index, color) => {
            if (color === 'white') return { forbidden: false };
            const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            let fours = 0, threes = 0;
            for (const [dr, dc] of directions) {
                let line = 1;
                for (let i = 1; i < 7; i++) {
                    const nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === 'black') line++;
                    else break;
                }
                for (let i = 1; i < 7; i++) {
                    const nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === 'black') line++;
                    else break;
                }
                if (line > 5) return { forbidden: true, reason: '장주(6목 이상) 금지' };
                if (line === 4) fours++;
                if (line === 3) threes++;
            }
            if (fours >= 2) return { forbidden: true, reason: '4-4 금수' };
            if (threes >= 2) return { forbidden: true, reason: '3-3 금수' };
            return { forbidden: false };
        };

        const checkWinner = (board, index, color) => {
            const r = Math.floor(index / BOARD_SIZE), c = index % BOARD_SIZE;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            for (const [dr, dc] of directions) {
                let count = 1;
                for (let i = 1; i < 6; i++) {
                    const nr = r + dr * i, nc = c + dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === color) count++;
                    else break;
                }
                for (let i = 1; i < 6; i++) {
                    const nr = r - dr * i, nc = c - dc * i;
                    if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && board[nr * BOARD_SIZE + nc] === color) count++;
                    else break;
                }
                if (color === 'black' && count === 5) return true;
                if (color === 'white' && count >= 5) return true;
            }
            return false;
        };

        // --- Main Components ---
        function OmokGame({ user }) {
            const [roomId, setRoomId] = useState('');
            const [gameData, setGameData] = useState(null);
            const [inputRoomId, setInputRoomId] = useState('');
            const [myColor, setMyColor] = useState(null);
            const [forbiddenMsg, setForbiddenMsg] = useState('');
            const [showRoleSelect, setShowRoleSelect] = useState(false);

            useEffect(() => {
                if (!user || !roomId) return;
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId);
                const unsubscribe = docRef.onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        setGameData(data);
                        if (data.playerBlack === user.uid) setMyColor('black');
                        else if (data.playerWhite === user.uid) setMyColor('white');
                        else if (!data.playerBlack) {
                            docRef.update({ playerBlack: user.uid });
                            setMyColor('black');
                        } else if (!data.playerWhite) {
                            docRef.update({ playerWhite: user.uid });
                            setMyColor('white');
                        } else {
                            setMyColor('observer');
                        }
                    }
                });
                return () => unsubscribe();
            }, [user, roomId]);

            const createRoom = async (preferredColor) => {
                const newId = Math.random().toString(36).substring(2, 8).toUpperCase();
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(newId);
                await docRef.set({
                    board: Array(BOARD_SIZE * BOARD_SIZE).fill(null),
                    turn: 'black',
                    playerBlack: preferredColor === 'black' ? user.uid : null,
                    playerWhite: preferredColor === 'white' ? user.uid : null,
                    winner: null,
                    lastMove: null
                });
                setRoomId(newId);
                setShowRoleSelect(false);
            };

            const placeStone = async (index) => {
                if (!gameData || gameData.winner || gameData.board[index] || gameData.turn !== myColor) return;
                if (myColor === 'black') {
                    const check = checkRenjuRules(gameData.board, index, 'black');
                    if (check.forbidden) {
                        setForbiddenMsg(check.reason);
                        setTimeout(() => setForbiddenMsg(''), 2000);
                        return;
                    }
                }
                const newBoard = [...gameData.board];
                newBoard[index] = myColor;
                const isWin = checkWinner(newBoard, index, myColor);
                const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rooms').doc(roomId);
                await docRef.update({
                    board: newBoard,
                    turn: myColor === 'black' ? 'white' : 'black',
                    winner: isWin ? myColor : null,
                    lastMove: index
                });
            };

            if (!roomId) {
                return (
                    <div className="max-w-md w-full bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl">
                        <h2 className="text-3xl font-black mb-8 text-center italic tracking-tighter text-orange-500">RENJU ONLINE</h2>
                        {showRoleSelect ? (
                            <div className="space-y-4">
                                <p className="text-center text-zinc-400 font-bold mb-4">선공/후공을 선택하세요</p>
                                <div className="grid grid-cols-2 gap-4">
                                    <button onClick={() => createRoom('black')} className="flex flex-col items-center gap-3 bg-zinc-800 hover:bg-black p-6 rounded-2xl border border-zinc-700 transition-all">
                                        <div className="w-10 h-10 rounded-full bg-black border border-zinc-600"></div>
                                        <span className="font-bold">흑 (선공)</span>
                                    </button>
                                    <button onClick={() => createRoom('white')} className="flex flex-col items-center gap-3 bg-zinc-800 hover:bg-zinc-100 group p-6 rounded-2xl border border-zinc-700 transition-all">
                                        <div className="w-10 h-10 rounded-full bg-white border border-zinc-300"></div>
                                        <span className="font-bold group-hover:text-black">백 (후공)</span>
                                    </button>
                                </div>
                                <button onClick={() => setShowRoleSelect(false)} className="w-full text-zinc-500 text-sm mt-4">뒤로 가기</button>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <button onClick={() => setShowRoleSelect(true)} className="w-full bg-orange-600 py-4 rounded-xl font-bold text-lg hover:bg-orange-500 transition-all">방 만들기</button>
                                <div className="text-center text-xs text-zinc-600 font-bold uppercase tracking-widest py-2">OR JOIN BY CODE</div>
                                <input type="text" placeholder="코드 입력" value={inputRoomId} onChange={e => setInputRoomId(e.target.value)} className="w-full bg-black border border-zinc-800 py-4 rounded-xl text-center font-mono text-xl uppercase outline-none focus:border-orange-600" />
                                <button onClick={() => setRoomId(inputRoomId.toUpperCase())} className="w-full bg-white text-black py-4 rounded-xl font-bold hover:bg-zinc-200">참가하기</button>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="flex flex-col items-center gap-6 w-full max-w-[600px]">
                    <div className="w-full flex justify-between items-center bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                        <div>
                            <div className="text-[10px] text-zinc-500 font-bold uppercase">Room Code</div>
                            <div className="text-xl font-black text-orange-500 font-mono tracking-widest">{roomId}</div>
                        </div>
                        <div className="text-center">
                            <div className={`w-3 h-3 rounded-full mx-auto mb-1 ${gameData?.winner ? 'bg-zinc-700' : 'bg-green-500 animate-pulse'}`}></div>
                            <div className="text-[10px] font-bold text-zinc-400 uppercase">{gameData?.winner ? 'Ended' : 'Live'}</div>
                        </div>
                        <div className="text-right">
                            <div className="text-[10px] text-zinc-500 font-bold uppercase">Your Role</div>
                            <div className="flex items-center gap-2 justify-end">
                                <span className="font-bold text-sm">{myColor === 'black' ? 'BLACK' : myColor === 'white' ? 'WHITE' : 'SPECTATOR'}</span>
                                <div className={`w-3 h-3 rounded-full border ${myColor === 'black' ? 'bg-black border-zinc-600' : myColor === 'white' ? 'bg-white border-zinc-300' : 'bg-transparent border-dashed border-zinc-600'}`}></div>
                            </div>
                        </div>
                    </div>

                    <div className="w-full h-14 relative flex items-center justify-center">
                        {forbiddenMsg && <div className="absolute inset-0 bg-red-600 text-white flex items-center justify-center rounded-xl font-black z-50 animate-bounce">{forbiddenMsg}! ⚠️</div>}
                        {gameData?.winner ? (
                            <div className="w-full h-full bg-orange-600 text-white flex items-center justify-center rounded-xl font-black text-xl italic uppercase underline decoration-white decoration-2 underline-offset-4">
                                {gameData.winner} wins! 👑
                            </div>
                        ) : (
                            <div className={`w-full h-full flex items-center justify-center rounded-xl border-2 font-black text-lg transition-all ${gameData?.turn === myColor ? 'bg-white text-black border-white shadow-lg' : 'bg-zinc-900 text-zinc-600 border-zinc-800'}`}>
                                {gameData?.turn === myColor ? '⚡ YOUR TURN ⚡' : `${gameData?.turn?.toUpperCase()}'S TURN...`}
                            </div>
                        )}
                    </div>

                    <div className="relative w-full aspect-square omok-board p-2 rounded-sm border-4 border-[#9e7d38]">
                        <div className="grid w-full h-full" style={{ gridTemplateColumns: `repeat(${BOARD_SIZE}, 1fr)`, gridTemplateRows: `repeat(${BOARD_SIZE}, 1fr)` }}>
                            {Array(BOARD_SIZE * BOARD_SIZE).fill(null).map((_, i) => (
                                <div key={i} onClick={() => placeStone(i)} className="relative flex items-center justify-center cursor-pointer group">
                                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                        <div className="h-[1px] bg-black/40 w-full"></div>
                                        <div className="w-[1px] bg-black/40 h-full absolute"></div>
                                    </div>
                                    {gameData?.board[i] && (
                                        <div className={`w-[85%] h-[85%] rounded-full z-10 shadow-lg transform scale-110 ${gameData.board[i] === 'black' ? 'bg-gradient-to-br from-zinc-700 to-black' : 'bg-gradient-to-br from-white to-zinc-300'} ${gameData.lastMove === i ? 'ring-2 ring-red-500 ring-offset-2 ring-offset-[#dcb35c]' : ''}`}></div>
                                    )}
                                    {!gameData?.board[i] && !gameData?.winner && gameData?.turn === myColor && (
                                        <div className={`w-[50%] h-[50%] rounded-full opacity-0 group-hover:opacity-30 z-10 ${myColor === 'black' ? 'bg-black' : 'bg-white'}`}></div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                    <button onClick={() => setRoomId('')} className="text-zinc-500 hover:text-white font-bold text-xs uppercase tracking-widest">나가기</button>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('omok');

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) setUser(u);
                    else auth.signInAnonymously();
                });
                return () => unsubscribe();
            }, []);

            if (!user) return <div className="h-screen flex items-center justify-center font-black tracking-widest animate-pulse text-orange-500">CONNECTING...</div>;

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="p-6 border-b border-zinc-800 flex justify-between items-center bg-zinc-950/80 sticky top-0 z-50 backdrop-blur-md">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center font-black text-white italic">A</div>
                            <span className="font-black text-xl tracking-tighter">ARCADE-X</span>
                        </div>
                        <div className="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800">
                            <button onClick={() => setActiveTab('omok')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${activeTab === 'omok' ? 'bg-zinc-800 text-white' : 'text-zinc-500'}`}>OMOK</button>
                            <button onClick={() => setActiveTab('tetris')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${activeTab === 'tetris' ? 'bg-zinc-800 text-white' : 'text-zinc-500'}`}>TETRIS</button>
                        </div>
                    </nav>
                    <main className="flex-grow flex flex-col items-center justify-center p-6">
                        {activeTab === 'omok' ? <OmokGame user={user} /> : <div className="text-zinc-500 italic">Tetris loading... (Please implementation here)</div>}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
